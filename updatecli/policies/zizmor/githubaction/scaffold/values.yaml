# NOTE: This file is a scaffold template for default values.
# These values are used by updatecli when rendering the policy manifest.
# Edit to match your repository or provide overrides at runtime with --values.

scm:
  # Enable or disable SCM integration for this policy.
  # When disabled, Updatecli will not open PRs or push changes.
  enabled: false

  # SCM provider kind (supported: github, githubsearch).
  # Use lowercase values.
  kind: github

  # Token lookup: by default Updatecli reads the token from the named
  # environment variable. Set this to the env var name (e.g. GITHUB_TOKEN).
  # Alternatively, you may set `token` below to provide a literal token
  # (not recommended for checked-in files).
  env_token: GITHUB_TOKEN

  # Optional: provide a literal token here (overrides env_token). Avoid committing secrets.
  # token: "ghp_xxx"

  # Repository settings (recommended to fill for CI / automation):
  # owner: my-org-or-user
  # repository: my-repo
  # username: updatecli-bot
  # user: updatecli-bot
  # email: updatecli-bot@example.com
  # branch: main

  commitusingapi: true

  limit: 3
  # depth controls how many commits are fetched when Updatecli interacts with the SCM. A lower depth can speed up operations but may limit the ability to access historical commit.
  # Adjust based on your needs. Default shallow clone disabled.
  depth: 0
  commitmessage:
    type: "chore"
    scope: "zizmor"
    #footers: "Signed-off-by: updateclibot <bot@updatecli.io>"
# Example: to disable SCM during local dry-runs, set `scm.enabled: false`.
#

pipelineid: scaffold_zizmor
automerge: false
# Parent is a boolean that controls whether the generated PR should target the parent of the repository or the repository itself.
# This is useful when the repository is a fork and you want to target the upstream repository instead of the fork.
# Default is false, meaning the PR will target the repository itself.
parent: false
labels:
  - "chore"

description: |+
  This PR was automatically created by Updatecli to set up a Zizmor GitHub Action workflow for security scanning.  

  Zizmor is a static analysis tool that identifies misconfigurations in GitHub Actions workflows.  
  Updatecli is a tool to automate configuration update across git repositories.  

  For more information:  

    * [Zizmor GitHub Action](https://github.com/zizmorcore/zizmor-action)  

    * [Updatecli Policies](https://github.com/updatecli/policies/tree/main/updatecli/policies/zizmor/githubaction/scaffold)  


gha:
  template_path: "https://raw.githubusercontent.com/updatecli/policies/refs/heads/main/updatecli/policies/zizmor/githubaction/scaffold/assets/gha_security_analysis.yaml"
  private: false
  advanced_security: true

pipeline:
  labels:
    ecosystem: "zizmor"
    policy: scaffold

# Optional, config expect a valid Zizmor configuration file content.
